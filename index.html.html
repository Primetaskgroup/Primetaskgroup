<form action="https://formspree.io/f/xyknwbld" method="POST" class="space-y-6">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="block text-gray-700 mb-2">Name *</label>
<input type="text" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
</div>

<div>
<label class="block text-gray-700 mb-2">Telefon *</label>
<input type="tel" name="phone" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
</div>

</div>

<div>
<label class="block text-gray-700 mb-2">E-Mail *</label>
<input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
</div>

<div>
<label class="block text-gray-700 mb-2">Dienstleistung</label>
<select name="service" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
<option value="">Bitte auswählen</option>
<option value="möbelaufbau">Möbelaufbau</option>
<option value="wandmontage">Wandmontage</option>
<option value="umzugshilfe">Umzugshilfe</option>
<option value="transport">Transportservice</option>
<option value="müllentsorgung">Müllentsorgung</option>
<option value="handwerker">Handwerkerarbeiten</option>
</select>
</div>

<div>
<label class="block text-gray-700 mb-2">Nachricht *</label>
<textarea name="message" rows="4" required class="w-full px-4 py-3 border border-gray-300 rounded-lg"></textarea>
</div>

<button type="submit" class="w-full bg-primary text-white py-4 rounded-lg font-bold text-lg hover:bg-blue-800 transition-colors">
Kostenloses Angebot anfordern
</button>

</form>
